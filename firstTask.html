<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elbert's Video Essay</title>
</head>
<body>
    <h1>Cats</h1>
    <img src="https://static.scientificamerican.com/sciam/cache/file/2AE14CDD-1265-470C-9B15F49024186C10_source.jpg?crop=1%3A1%2Csmart&w=1000">
    <p>Cats are Stupid</p>
    <h3>Common Breeds</h3>
    <ul>
        <li><h3>Persian</h3></li>
        <li><h3>Maine Coon</h3></li>
        <li><h3>Siamese</h3></li>
        <li><h3>Ragdoll</h3></li>
        <li><h3>British Shirthair</h3></li>
    </ul>
    <h3>Comments</h3>
    <div id="commentsContainer"></div>
    <p>name</p>
    <input placeholder="your name", id="inputName">
    <p>comment</p>
    <input placeholder="your comment", id="inputComment">
    <button id="submitButton">Submit</button>

    <script>
        //------------------ variables
        const commentContainer = document.getElementById("commentsContainer");
        const getNameInput = document.getElementById("inputName");
        const getCommentInput = document.getElementById("inputComment");
        const getSubmitButton = document.getElementById("submitButton")
        //------------------ functions
        function insertComment (name, comment) {
            commentContainer.innerHTML += `
            <strong>${name}</strong>: ${comment} </br>
            `}
        function onSubmitButtonClicked () {
            const name = getNameInput.value;
            const comment = getCommentInput.value;
            insertComment(name, comment);
            getNameInput.value = "";
            getCommentInput.value = "";
        };
        //------------------ execution
        getSubmitButton.addEventListener("click", onSubmitButtonClicked)
    </script>
        
</body>
</html>
